<html lang="en">
<head>
<meta charset="utf-8"/>

<meta name="description" content="Build, deploy, and orchestrate with AI agents. Your private cognitive layer."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* Landing-specific */
.hero-wrap {
  position:relative; min-height:100vh; padding-top:var(--nav-h);
  overflow:hidden; background:#000;
  display:flex; flex-direction:column;
}
.hero-inner {
  position:relative; z-index:1; width:100%;
  max-width:var(--shell); margin:0 auto; padding:72px 28px 0;
}
.hero-tag {
  font-family:var(--mono); font-size:10px; letter-spacing:.28em;
  text-transform:uppercase; color:var(--text-mute); margin-bottom:28px;
  display:flex; align-items:center; gap:10px;
}
.hero-h1 {
  font-size:clamp(52px,8vw,120px);
  font-weight:300; letter-spacing:-0.045em; line-height:0.95;
  background:linear-gradient(175deg,#f2f6fa 0%,#9eb0c0 45%,#3d5568 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:28px;
  filter:drop-shadow(0 0 20px rgba(0,0,0,0.6)) drop-shadow(0 2px 15px rgba(0,0,0,0.4));
  text-shadow: 0 0 30px rgba(0,0,0,0.5), 0 2px 20px rgba(0,0,0,0.3);
}
.hero-h1 .em { background:linear-gradient(130deg,#34d399,#10b981); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.hero-sub {
  font-size:clamp(15px,1.4vw,19px); color:var(--text-dim);
  max-width:560px; line-height:1.65; margin-bottom:40px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.5), 0 2px 12px rgba(0,0,0,0.3);
}
.hero-tag { text-shadow:0 1px 8px rgba(0,0,0,0.9); }
.hero-ctas { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:64px; }
.signup-form {
  width: 100%;
  max-width: min(90vw, 420px);
}
.signup-controls {
  width: 100%;
  display: flex !important;
  flex-direction: column !important;
  align-items: center;
  gap: 12px !important;
}
.hero-ctas .signup-controls input,
.hero-ctas .signup-controls button {
  width: 100% !important;
  height: 54px !important;
  min-height: 54px;
  font-size: 16px !important;
  border-radius: var(--r-md) !important;
}
.hero-ctas .signup-controls input {
  background: rgba(3, 5, 10, 0.58) !important;
  border: 1px solid rgba(226, 232, 240, 0.24) !important;
  box-shadow: 0 10px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  text-align: center;
}
.hero-ctas .signup-controls button {
  background: rgba(3, 5, 10, 0.46) !important;
  border: 1px solid rgba(52, 211, 153, 0.5) !important;
  color: var(--em-bright) !important;
  box-shadow: 0 12px 36px rgba(0,0,0,0.28), 0 0 28px rgba(16,185,129,0.16) !important;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  letter-spacing: 0.02em !important;
  padding: 0 20px !important;
}
.hero-stat { font-family:var(--mono); font-size:11px; color:var(--text-mute); }

/* VIDEO BACKGROUND */
.hero-video-bg {
  position:absolute; inset:0; z-index:0; overflow:hidden;
}
.hero-video-bg video {
  position:absolute; inset:0;
  width:100%; height:100%;
  min-width:0; min-height:0;
  object-fit:cover;
  object-position:center center;
}
.hero-video-mobile { display:none; }
.hero-overlay {
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:linear-gradient(180deg, rgba(0,0,0,0.15) 0%, transparent 40%, rgba(0,0,0,0.5) 100%);
}

/* ── Section content ── */
.page-section {
  padding: 80px 0;
  border-bottom: 1px solid var(--border);
}
.page-section:last-of-type {
  border-bottom: none;
}
.section-title {
  font-size: clamp(34px,4.5vw,68px);
  font-weight: 400;
  letter-spacing: -0.03em;
  background: linear-gradient(175deg, #f0f4f8 0%, #b0bec8 50%, #4a6070 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 48px;
}
.section-label {
  font-family:var(--mono); font-size:10px;
  text-transform:uppercase; letter-spacing:0.18em;
  color:var(--text-mute); margin-bottom:28px;
  display:flex; align-items:center; gap:14px;
}
.section-label::before,.section-label::after {
  content:""; flex:1; height:1px;
  background: linear-gradient(90deg,transparent,var(--border-2),transparent);
}

.text-content {
  max-width: 800px;
  font-size: 16px;
  line-height: 1.8;
  color: var(--text-dim);
}
.text-content h3 {
  font-size: 24px;
  color: var(--text);
  margin: 32px 0 16px;
  font-weight: 500;
}
.text-content p {
  margin-bottom: 20px;
}
.text-content ul, .text-content ol {
  margin-bottom: 20px;
  padding-left: 24px;
}
.text-content li {
  margin-bottom: 12px;
  color: var(--text-dim);
}

/* ── Responsive ── */
@media (max-width:1024px) {
  .shell { padding: 0 32px; }
  .page-section { padding: 60px 0; }
  .section-title { font-size: clamp(28px,3.5vw,48px); margin-bottom: 40px; }
  .hero-h1 { font-size: clamp(40px,6vw,80px); }
  .hero-sub { font-size: clamp(14px,1.2vw,16px); margin-bottom: 32px; }
  .hero-inner { padding: 60px 32px 0; }
}

@media (max-width:768px) {
  html, body, #root, main, .page, section {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }
  section {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    padding: 24px 16px !important;
  }
  .shell {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    padding: 0;
  }
  .hero-wrap {
    min-height: 100svh;
    padding-top: 0;
    justify-content: center;
    align-items: center;
  }
  .hero-video-desktop { display:none; }
  .hero-video-mobile {
    display:block;
    width:100%;
    height:100%;
    min-width:100%;
    min-height:100%;
    object-fit:cover;
    object-position:center center;
  }
  .hero-inner {
    min-height: 100svh;
    max-width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: calc(var(--nav-h) + 64px) 16px 64px;
  }
  .hero-h1 { font-size: 32px; margin-bottom: 20px; line-height: 1; }
  .hero-sub { font-size: 14px; margin: 0 auto 24px; max-width: 100%; }
  .hero-tag { justify-content: center; }
  .hero-ctas {
    width: 100%;
    max-width: min(90vw, 420px) !important;
    align-items: center !important;
    margin: 0 auto 0;
    gap: 12px !important;
  }
  .signup-form {
    width: 100% !important;
    max-width: min(90vw, 420px) !important;
    margin: 0 auto !important;
  }
  .signup-controls {
    width: 100% !important;
    max-width: 100% !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    gap: 12px !important;
  }
  .hero-ctas form {
    width: 100% !important;
    max-width: 100%;
    align-items: center;
    gap: 12px !important;
  }
  .hero-ctas form > div {
    width: 100%;
    max-width: 100%;
    gap: 12px !important;
  }
  .hero-ctas input,
  .hero-ctas button {
    width: 100% !important;
    min-height: 54px;
    height: 54px;
    font-size: 16px !important;
    border-radius: var(--r-md) !important;
  }
  .hero-ctas input {
    background: rgba(3, 5, 10, 0.58) !important;
    border: 1px solid rgba(226, 232, 240, 0.24) !important;
    box-shadow: 0 10px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    text-align: center;
  }
  .hero-ctas button {
    min-width: 0;
    padding: 0 20px !important;
    background: rgba(3, 5, 10, 0.46) !important;
    border: 1px solid rgba(52, 211, 153, 0.5) !important;
    color: var(--em-bright) !important;
    box-shadow: 0 12px 36px rgba(0,0,0,0.28), 0 0 28px rgba(16,185,129,0.16) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    letter-spacing: 0.02em !important;
  }
  .page-section { padding: 24px 16px !important; }
  .section-title { font-size: 28px; margin-bottom: 32px; }
  .section-label { font-size: 9px; margin-bottom: 16px; }
  .text-content { font-size: 15px; line-height: 1.7; }
  .text-content h3 { font-size: 18px; margin: 24px 0 12px; }
  .text-content p { margin-bottom: 16px; }
  .text-content ul, .text-content ol { margin-bottom: 16px; padding-left: 20px; }
  .text-content li { margin-bottom: 10px; }
  .hero-tag { font-size: 9px; margin-bottom: 16px; }
  .about-intro-grid {
    grid-template-columns: 1fr !important;
    gap: 20px !important;
    margin-bottom: 20px !important;
  }
  .about-blueprint-panel {
    position: relative !important;
    top: auto !important;
  }
  .about-blueprint-panel img {
    width: 100vw !important;
    max-width: 100vw !important;

    max-height: none;
    margin-left: calc(50% - 50vw);
    margin-right: calc(50% - 50vw);
    border-radius: 0 !important;
    object-fit: contain;
    object-position: center center;
    background: rgba(3, 5, 10, 0.75);
  }
  .products-list {
    gap: 32px !important;

  }
  .product-row {
    grid-template-columns: 1fr !important;

  }
  .product-row > div {
    width: 100%;
    max-width: 100%;
  }
  .product-features {
    grid-template-columns: 1fr !important;
    gap: 12px !important;
  }
  .product-media {
    width: 100vw !important;

  }

  /* Form responsive */

  }
}

@media (max-width:480px) {
  .hero-inner { padding: calc(var(--nav-h) + 54px) 16px 56px; }
  .hero-h1 { font-size: 28px; margin-bottom: 16px; }
  .hero-sub { font-size: 14px; margin-bottom: 20px; line-height: 1.55; }
  .hero-ctas { margin-bottom: 0; }
  .page-section { padding: 24px 16px !important; }
  .section-title { font-size: 24px; margin-bottom: 20px; }
  .section-label { font-size: 8px; margin-bottom: 12px; }

  }

    max-height: none;
  }
  
  /* Form mobile */
  .hero-ctas form { width: 100%; display: flex; flex-direction: column; gap: 12px !important; }
  .hero-ctas form > div { flex-direction: column !important; width: 100% !important; gap: 12px !important; }

  .hero-ctas button {

  }

}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="shared.jsx" data-presets="env,react"></script>
<script type="text/babel" src="advisor-gallery.jsx" data-presets="env,react"></script>
<script type="text/babel" data-presets="env,react">




const { useState, useEffect } = React;

function LandingPage() {
  const initialSection = new URLSearchParams(window.location.search).get('section') || 'home';
  const [activeSection, setActiveSection] = useState(initialSection);
  const [formStatus, setFormStatus] = useState({});

  useEffect(() => {
    const handlePopState = () => {
      setActiveSection(new URLSearchParams(window.location.search).get('section') || 'home');
    };

    window.addEventListener('popstate', handlePopState);
    return () => window.removeEventListener('popstate', handlePopState);
  }, []);

  function navigateSection(section) {
    setActiveSection(section);
    const nextUrl = section === 'home' ? 'index.html' : `index.html?section=${section}`;
    window.history.pushState({}, '', nextUrl);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function submitLead(event, type) {
    event.preventDefault();
    const form = event.currentTarget;
    const formData = new FormData(form);
    const payload = Object.fromEntries(formData.entries());

    setFormStatus((current) => ({ ...current, [type]: 'sending' }));

    try {
      const response = await fetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, ...payload })
      });

      if (!response.ok) {
        const result = await response.json().catch(() => ({}));
        throw new Error(result.error || 'Unable to submit right now.');
      }

      form.reset();
      setFormStatus((current) => ({ ...current, [type]: 'sent' }));
    } catch (error) {
      setFormStatus((current) => ({ ...current, [type]: 'error' }));
    }
  }

  const navLinks = [
  { id: 'home', label: 'Home' },
  { id: 'products', label: 'Products' },
  { id: 'about', label: 'About' },
  { id: 'contact', label: 'Contact' }];


  return (
    <>
      {/* Custom nav for landing */}
      <nav className="topnav" style={{ background: 'rgba(3,5,10,0.95)' }}>
        <div className="topnav-inner" style={{ height: "60px" }}>
          <a href="index.html" className="brand" style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
            <img src="assets/mv1-logo.png" alt="Metallic V1" style={{ height: '32px', width: 'auto' }} />
            <span style={{ display: 'none' }}>METALLIC</span>
          </a>
          <div className="nav-links">
            {navLinks.map((link) =>
            <button
              key={link.id}
              onClick={() => navigateSection(link.id)}
              style={{
                background: 'none',
                border: 'none',
                padding: '7px 13px',
                borderRadius: 'var(--r-sm)',
                fontSize: '13px',
                cursor: 'pointer',
                transition: 'all 0.12s',
                color: activeSection === link.id ? 'var(--em-bright)' : 'var(--text-dim)',
                ...{
                  ':hover': {
                    color: 'var(--text)',
                    background: 'var(--surface)'
                  }
                }
              }}>
              
                {link.label}
              </button>
            )}
          </div>
          <div className="nav-right">
            <span className="nav-pill"><span className="dot" style={{ backgroundColor: "rgb(255, 84, 142)" }} />Live</span>
          </div>
        </div>
      </nav>

      <div className="page">
        {/* ── HOME ── */}
        {activeSection === 'home' &&
        <>
            <div className="hero-wrap">
              <div className="hero-video-bg">
                <video className="hero-video-desktop" autoPlay loop muted playsInline preload="metadata" onCanPlay={(e) => { e.currentTarget.muted = true; e.currentTarget.play().catch(() => {}); }}>
                  <source src="assets/hero.mp4" type="video/mp4" />
                </video>
                <video className="hero-video-mobile" autoPlay loop muted playsInline preload="metadata" onCanPlay={(e) => { e.currentTarget.muted = true; e.currentTarget.play().catch(() => {}); }}>
                  <source src="assets/hero-mobile.mp4" type="video/mp4" />
                </video>
              </div>
              <div className="hero-overlay" />
              <div className="hero-inner" style={{ position: "relative", zIndex: 2 }}>
                <div className="hero-tag">
                  <span className="live-dot" />
                  METALLIC.V1 · LIVE
                </div>
                <h1 className="hero-h1">
                  Synthetic Executive<br />
                  Intelligence
                </h1>
                <p className="hero-sub">
                  AI Agent Platform for Founders, Operators, and Enterprises. Ship custom intelligence in minutes.
                </p>
                <div className="hero-ctas" style={{ flexDirection: 'column', alignItems: 'flex-start', maxWidth: '420px', gap: '20px' }}>
                  <form className="signup-form" onSubmit={(e) => submitLead(e, 'waitlist')} style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '12px' }}>
                    <label style={{ fontSize: '13px', fontWeight: '600', color: 'var(--text)', textTransform: 'uppercase', letterSpacing: '0.05em' }}>
                      Join the Waitlist
                    </label>
                    <div className="signup-controls" style={{ display: 'flex', gap: '8px' }}>
                      <input
                      type="email"
                      name="email"
                      required
                      placeholder="Enter your email"
                      style={{
                        flex: 1,
                        padding: '14px 16px',
                        background: 'var(--surface-2)',
                        border: '1px solid var(--border)',
                        borderRadius: 'var(--r-md)',
                        color: 'var(--text)',
                        fontFamily: 'inherit',
                        fontSize: '14px',
                        outline: 'none',
                        transition: 'all 0.15s'
                      }}
                      onFocus={(e) => e.target.style.borderColor = 'rgba(52,211,153,0.45)'}
                      onBlur={(e) => e.target.style.borderColor = 'var(--border)'} />
                    
                      <button
                      type="submit"
                      disabled={formStatus.waitlist === 'sending'}
                      style={{
                        padding: '14px 32px',
                        background: 'linear-gradient(180deg, #0f9060 0%, #0a7048 100%)',
                        border: '1px solid var(--em)',
                        borderRadius: 'var(--r-md)',
                        color: '#fff',
                        fontFamily: 'inherit',
                        fontSize: '14px',
                        fontWeight: '700',
                        cursor: 'pointer',
                        transition: 'all 0.15s',
                        whiteSpace: 'nowrap',
                        boxShadow: '0 4px 24px -6px rgba(16,185,129,0.5)',
                        textTransform: 'uppercase',
                        letterSpacing: '0.05em'
                      }}
                      onMouseEnter={(e) => e.target.style.boxShadow = '0 8px 40px -4px rgba(16,185,129,0.8)'}
                      onMouseLeave={(e) => e.target.style.boxShadow = '0 4px 24px -6px rgba(16,185,129,0.5)'}>
                      
                        {formStatus.waitlist === 'sending' ? 'Sending...' : 'Join Now'}
                      </button>
                    </div>
                    <p style={{ fontSize: '12px', color: 'var(--text-mute)', margin: '0' }}>
                      {formStatus.waitlist === 'sent' ? 'You are on the waitlist.' : formStatus.waitlist === 'error' ? 'Submission failed. Try again in a moment.' : 'Be first to access Synthetic Executive Intelligence'}
                    </p>
                  </form>
                </div>
              </div>
            </div>

            {/* Advisor Gallery */}
            <AdvisorGallery />
          </>
        }

        {/* ── PRODUCTS ── */}
        {activeSection === 'products' &&
        <section className="page-section" style={{ paddingTop: '80px', paddingBottom: '80px' }}>
          <div className="shell">
            <div className="section-label">PRODUCTS</div>
            <h2 className="section-title">Enterprise AI Platforms</h2>
            <p className="text-content" style={{ maxWidth: '700px', marginBottom: '80px' }}>
              Four specialized systems built for founders, operators, and enterprises who demand precision, control, and measurable impact.
            </p>

            <div className="products-list" style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '80px', marginBottom: '60px' }}>
              {[
